name: CI

on:
   push:
   pull_request:

jobs:
   check:
      runs-on: ubuntu-latest

      steps:
         - name: Check out repository
           uses: actions/checkout@v4

         - name: Set up Node.js
           uses: actions/setup-node@v6
           with:
              node-version: 24
              cache: npm

         - name: Install dependencies
           run: npm ci

         - name: Run repository checks
           run: npm run check

         - name: Generate coverage report
           run: npm run coverage
