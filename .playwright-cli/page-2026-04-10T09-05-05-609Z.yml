        - generic [ref=e51]:
          - heading "Vi är Valsta!" [level=1] [ref=e52]
          - paragraph [ref=e53]: Välkommen till bostadsområdet Valstas alldeles egen hemsida! Vi som står bakom sajten är drygt 20 lokala aktörer –fastighetsägare, Sigtuna kommun, föreningar, näringsidkare och lokalpolisen. Tillsammans med dig som bor här vill vi göra Valsta till en trygg och mer levande stadsdel. En plats som boende är stolta över och företag vill verka i. Här rapporterar vi om allt det roliga som händer i området, men också om problem och utmaningar. På så vis kan vi bredda bilden av Valsta och skapa en naturlig gemenskap. Tillsammans är vi Valsta!
      - generic "Kvinna gör peacetecken med fingrarna" [ref=e57]
    - generic [ref=e63]:
      - heading "Vi är ett" [level=2] [ref=e64]
      - paragraph [ref=e65]: Vi som bor i Valsta är i stort sett nöjda med vår hemmaplan. Hela 84% trivs hyfsat bra. Och 56% trivs mycket bra! Det visar en färsk enkätundersökning till 2000 slumpvis valda hushåll. Det vi gillar mest är våra lummiga, mysiga innergårdar, närheten till strövområden och sköna cykelvägar. Och förstås den fina gemenskapen som format vårt område sedan 1970-talet, den som ”gör oss till ett”.
      - paragraph [ref=e66]:
        - link "Läs mer" [ref=e67] [cursor=pointer]:
          - /url: https://viarvalsta.se/vi-ar-ett/
