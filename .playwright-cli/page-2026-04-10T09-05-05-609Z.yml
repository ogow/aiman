      - generic [ref=e90]:
        - heading "Om oss" [level=2] [ref=e91]
        - paragraph [ref=e92]: Vi som står bakom den här sajten är en ideell förening bestående av fastighetsägare, lokala hyresgästföreningar, företagare och andra lokala verksamheter i Valsta. Vår grundidé är att ett gemensamt arbete ger större effekt än enskilda insatser. När vi samlar våra resurser – och delar idéer och perspektiv – står vi bättre rustade att bidra till ett tryggare och mer attraktivt Valsta. Vi arbetar redan utifrån en strukturerad modell och har satt en gemensam handlingsplan. Den här sajten ser vi som ett tredje ben som kommer ge ytterligare kraft till våra satsningar.
